<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Wallpaper Site Pro</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <div class="logo">Wallpaper Pro</div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
        </ul>
        <button class="theme-toggle">🌓</button>
    </nav>
    <main style="padding: 80px 5%; max-width: 600px; margin: 0 auto;">
        <h1>Contact Us</h1>
        <p style="margin-top: 20px; color: var(--secondary-text);">Have a question or suggestion? We'd love to hear from you!</p>
        <form style="margin-top: 30px;">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Email</label>
                <input type="email" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); background: var(--card-bg); color: var(--text-color);">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Message</label>
                <textarea style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); background: var(--card-bg); color: var(--text-color); min-height: 150px;"></textarea>
            </div>
            <button type="submit" style="background: var(--primary-color); color: white; padding: 12px 30px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer;">Send</button>
        </form>
    </main>
    <script src="/js/data.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
