<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Wallpaper Site Pro</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .admin-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 18px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-color);
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: inherit;
            font-size: 1rem;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0,122,255,0.1);
        }
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }
        .file-input-label {
            display: block;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .file-input-label:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
        .file-name {
            margin-top: 8px;
            font-size: 0.9rem;
            color: var(--secondary-text);
        }
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-submit {
            background: var(--primary-color);
            color: white;
        }
        .btn-submit:hover {
            background: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,122,255,0.3);
        }
        .btn-reset {
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid rgba(0,0,0,0.1);
        }
        .btn-reset:hover {
            background: rgba(0,0,0,0.05);
        }
        .progress-section {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: rgba(0,122,255,0.05);
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
        }
        .progress-section.show {
            display: block;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0,0,0,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }
        .status-message {
            margin-top: 10px;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.95rem;
        }
        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .preview-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 10px;
        }
        .admin-header {
            margin-bottom: 40px;
            border-bottom: 2px solid rgba(0,0,0,0.1);
            padding-bottom: 20px;
        }
        .admin-header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }
        .admin-header p {
            color: var(--secondary-text);
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Wallpaper Pro</div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/admin.html">Admin</a></li>
        </ul>
        <button class="theme-toggle" aria-label="Toggle Theme">🌓</button>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h1>📸 Upload Wallpaper</h1>
            <p>Add new wallpapers to your site instantly</p>
        </div>

        <form id="uploadForm">
            <div class="form-group">
                <label for="imageFile">Select Image (JPG/PNG)</label>
                <div class="file-input-wrapper">
                    <input type="file" id="imageFile" accept="image/jpeg,image/png" required>
                    <label for="imageFile" class="file-input-label">📁 Click to select or drag & drop</label>
                </div>
                <div class="file-name" id="fileName"></div>
                <div class="preview-section" id="previewSection" style="display: none;">
                    <p><strong>Preview:</strong></p>
                    <img id="previewImage" class="preview-image" alt="Preview">
                </div>
            </div>

            <div class="form-group">
                <label for="title">Wallpaper Title *</label>
                <input type="text" id="title" placeholder="e.g. Beautiful Sunset" required>
            </div>

            <div class="form-group">
                <label for="category">Category *</label>
                <select id="category" required>
                    <option value="">-- Select Category --</option>
                    <option value="phone">Phone</option>
                    <option value="tablet">Tablet</option>
                    <option value="anime">Anime</option>
                    <option value="girl">Girls</option>
                    <option value="mood">Mood</option>
                    <option value="dream-zodiac">Dream Zodiac</option>
                    <option value="zodiac-constellation">Zodiac Constellation</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tags">Tags (comma separated) *</label>
                <input type="text" id="tags" placeholder="e.g. nature, sunset, red" required>
            </div>

            <div class="form-group">
                <label for="description">Description (optional)</label>
                <textarea id="description" placeholder="Add a detailed description for SEO..."></textarea>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit">🚀 Upload & Generate</button>
                <button type="reset" class="btn-reset">🔄 Clear</button>
            </div>
        </form>

        <div class="progress-section" id="progressSection">
            <p><strong>Processing...</strong></p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div id="statusMessage"></div>
        </div>
    </div>

    <script src="/js/data.js"></script>
    <script>
        const form = document.getElementById('uploadForm');
        const imageFile = document.getElementById('imageFile');
        const fileName = document.getElementById('fileName');
        const previewSection = document.getElementById('previewSection');
        const previewImage = document.getElementById('previewImage');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const statusMessage = document.getElementById('statusMessage');

        // File preview
        imageFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileName.textContent = `Selected: ${file.name}`;
                
                // Show preview
                const reader = new FileReader();
                reader.onload = (event) => {
                    previewImage.src = event.target.result;
                    previewSection.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Drag and drop
        const fileInputLabel = document.querySelector('.file-input-label');
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            fileInputLabel.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            fileInputLabel.addEventListener(eventName, () => {
                fileInputLabel.style.background = '#0056b3';
            });
        });

        ['dragleave', 'drop'].forEach(eventName => {
            fileInputLabel.addEventListener(eventName, () => {
                fileInputLabel.style.background = 'var(--primary-color)';
            });
        });

        fileInputLabel.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            imageFile.files = files;
            
            // Trigger change event
            const event = new Event('change', { bubbles: true });
            imageFile.dispatchEvent(event);
        });

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const file = imageFile.files[0];
            if (!file) {
                showStatus('Please select an image', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('image', file);
            formData.append('title', document.getElementById('title').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('tags', document.getElementById('tags').value);
            formData.append('description', document.getElementById('description').value);

            progressSection.classList.add('show');
            progressFill.style.width = '0%';
            showStatus('Uploading and processing...', 'info');

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                progressFill.style.width = '50%';
                showStatus('Converting image...', 'info');

                const result = await response.json();

                if (response.ok) {
                    progressFill.style.width = '100%';
                    showStatus(`✅ Success! New wallpaper: ${result.slug}`, 'success');
                    form.reset();
                    fileName.textContent = '';
                    previewSection.style.display = 'none';
                    setTimeout(() => {
                        progressSection.classList.remove('show');
                    }, 3000);
                } else {
                    showStatus(`❌ Error: ${result.error}`, 'error');
                }
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
            }
        });

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = `status-message ${type}`;
        }
    </script>
</body>
</html>
